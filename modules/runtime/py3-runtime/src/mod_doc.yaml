name: "runtime.py3"
version: "0.1.0"
author: "Bo Maryniuk"
description: Python 3.14 runtime module.

options:
  - name: rt.list
    description: "List of available Python scripts, ready to be called as modules."

  - name: rt.logs
    description: "Enable logging from Python scripts to SysInspect logs."

arguments:
  - name: "[ANY]"
    type: string
    required: false
    description: |
      Additional arguments that will be passed to the Python module being executed.

examples:
  - description: "Call a Python runtime module from model DSL with module `py3.hello`"
    code: |
      module: py3.hello

returns:
  fill:
    :description: |
      Returns runtime result payload with module data and optional logs.
    retcode: 0
    message: "Called Python module successfully."
    data:
      changed: false

manpage: |
  This module allows executing Python 3 scripts as modules within
  the SysInspect framework with Python 3.14 compatibility.

  Keep the following directory structure:

  1. Runtime Python modules must be installed in
  [y::]${SYSINSPECT_SHARELIB_ROOT}[Y::]/lib/runtime/python3/[N]

  2. Runtime Python libraries should be installed in
  [y::]${SYSINSPECT_SHARELIB_ROOT}[Y::]/lib/runtime/python3/site-packages[N]
