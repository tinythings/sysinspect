name: "runtime.wasm"
version: "0.1.0"
author: "Bo Maryniuk"
description: Wasm runtime module.

# Options, flags, switches
options:
#  - name: rt.list
#    description: "List of available Wasm scripts, ready to be called as modules."
#
#  - name: rt.sandbox
#    description: "Run Wasm binaries in sandboxed environment."

# Keyword arguments
arguments:
  - name: rt.rootfs
    type: string
    required: false
    description: |
      Path to the root filesystem directory that will be mounted
      inside the Wasm runtime environment. This allows the Wasm binary
      to access files and directories within the specified rootfs.

  - name: "[ANY]"
    type: string
    required: false
    description: |
      Additional arguments that will be passed to the Wasm binary being executed. These arguments will be available within the Wasm binary
      as global variables.

examples:
  - description: "Call a Wasm runtime module from model DSL with module `wasm.hello_world`"
    code: |
      { "module": "wasm.hello_world", "args": { "name": "Germany" } }

# Description of additional data format
returns:
  # Output data structure as a sample
  # Happens by default
  fill:
    :description: |
      Returns just a regular text of the command STDOUT.
    retcode: 0
    message: "Called Wasm binary successfully."
    data:
      changed: false

manpage: |
  This module allows executing Wasm binaries as modules within
  the SysInspect framework. The module supports passing additional
  arguments to the Wasm binary, which will be available as global
  variables within the binary.

  Wasm guest modules may emit runtime logs through the low-level
  [W::b]api.log(level, msg_ptr, msg_len)[N] host import. The runtime
  collects these guest log entries and remaps the resulting
  [W::b]__module-logs[N] payload field into the standard
  [W::b]__sysinspect-module-logs[N] field so SysInspect observes Wasm
  runtime logs in the same response location as Lua and Python runtime
  logs.

  Guest modules may return a ``__module-logs`` array in their JSON payload.
  The runtime remaps it to the standard ``__sysinspect-module-logs`` field so
  SysInspect observes Wasm module logs the same way it observes Lua and Python
  runtime logs. Unlike Lua and Python, the Wasm runtime does not inject a
  high-level ``log`` namespace into the guest language; guest code uses the
  lower-level ``api.log(...)`` import or a language-specific wrapper built on
  top of it.

  Important to keep the following directory structure for your
  Wasm binaries and their dependencies. The [W::b]main Wasm binaries[N]
  (modules) for this runtime must be installed in the following directory:
  [y::]${SYSINSPECT_SHARELIB_ROOT}[Y::]/lib/runtime/wasm/[N]
