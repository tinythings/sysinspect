name: MeNotify Package Self-Heal Demo
version: "0.1"
description: |
  Demo model for self-healing cowsay when a menotify PackageKit sensor notices
  that the package was removed.
maintainer: Sysinspect Demo

checkbook: {}
relations: {}

entities:
  cowsay-package:
    descr: Demo entity representing cowsay package presence

actions:
  reinstall-cowsay:
    descr: Reinstall cowsay through Lua runtime and PackageKit
    module: runtime.lua-runtime
    bind:
      - cowsay-package
    state:
      $:
        opts:
          - rt.logs
        args:
          rt.mod: reinstall-cowsay
          package: cowsay

constraints: {}

events:
  $|$|$|$:
    handlers:
      - console-logger
      - outcome-logger

    console-logger:
      concise: false
      prefix: MeNotify Package Self-Heal Demo

    outcome-logger:
      prefix: MeNotify Package Self-Heal Demo
