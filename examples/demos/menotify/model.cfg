name: MeNotify Package Self-Heal Demo
version: "0.1"
description: |
  Demo model for self-healing packages when a menotify PackageKit sensor notices
  that a tracked package was removed.
maintainer: Sysinspect Demo

checkbook: {}
relations: {}

entities:
  tracked-package:
    descr: Demo entity representing tracked package presence

actions:
  package-op:
    descr: Run a generic PackageKit operation through Lua runtime
    module: lua.packagekit
    context:
      action: Requested PackageKit operation passed from the triggering event
      package: Package name passed from the triggering event
    bind:
      - tracked-package
    state:
      $:
        opts:
          - rt.logs
        args:
          action: "context(action)"
          package: "context(package)"

constraints: {}

events:
  $|$|$|$:
    handlers:
      - console-logger
      - outcome-logger

    console-logger:
      concise: false
      prefix: MeNotify Package Self-Heal Demo

    outcome-logger:
      prefix: MeNotify Package Self-Heal Demo
