sensors:
  interval:
    min: 15
    max: 15
    unit: seconds

  github-public-issues:
    description: Poll GitHub issues on a public repository and emit one event per new issue.
    listener: menotify.githubissues
    args:
      owner: your-github-user-or-org
      repo: your-public-repo
      state: open
      per_page: 20
      user_agent: sysinspect-menotify-demo
      # token: ghp_xxx

  packagekit-history:
    description: Poll installed packages through PackageKit and reinstall cowsay when it was removed.
    listener: menotify.pkgnotify
    opts:
      - removed
    args:
      track:
        - cowsay

events:
  github-public-issues|menotify.githubissues|opened@$|0:
    handlers:
      - console-logger

    console-logger:
      concise: false
      prefix: GitHub Issues Demo

  packagekit-history|menotify.pkgnotify|removed@$|0:
    handlers:
      - pipeline
      - console-logger

    pipeline:
      calls:
        - query: menotify/tracked-package/package-op
          context:
            action: install
            package: $.package
      verbose: true

    console-logger:
      concise: false
      prefix: PackageKit Demo

  $|$|$|$:
    handlers:
      - outcome-logger

    outcome-logger:
      prefix: GitHub Issues Demo
