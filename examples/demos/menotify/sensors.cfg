sensors:
  interval:
    min: 15
    max: 15
    unit: seconds

  github-public-issues:
    description: Poll GitHub issues on a public repository and emit one event per new issue.
    listener: menotify.githubissues
    args:
      owner: your-github-user-or-org
      repo: your-public-repo
      state: open
      per_page: 20
      user_agent: sysinspect-menotify-demo
      bootstrap_emit_existing: false
      # token: ghp_xxx

  packagekit-history:
    description: Poll PackageKit history and emit one event per new package install or removal.
    listener: menotify.pkgnotify
    args:
      packages:
        - bash
      history_count: 20
      bootstrap_emit_existing: false

events:
  github-public-issues|menotify.githubissues|opened@$|0:
    handlers:
      - console-logger

    console-logger:
      concise: false
      prefix: GitHub Issues Demo

  packagekit-history|menotify.pkgnotify|installed@$|0:
    handlers:
      - console-logger

    console-logger:
      concise: false
      prefix: PackageKit Demo

  packagekit-history|menotify.pkgnotify|removed@$|0:
    handlers:
      - console-logger

    console-logger:
      concise: false
      prefix: PackageKit Demo

  $|$|$|$:
    handlers:
      - outcome-logger

    outcome-logger:
      prefix: GitHub Issues Demo
