name: Keypair Demo
version: "0.1"
description: |
  Demo model for self-healing host keypairs in /tmp/keypairdemo and syncing
  per-host public keys to Master datastore.
maintainer: Sysinspect Demo

checkbook:
  keypair:
    - keypair-demo

relations:
  keypair-demo:
    $:
      requires:
        - keypair-files

entities:
  keypair-files:
    descr: Host keypair files in /tmp/keypairdemo

actions:
  keypair-bootstrap:
    descr: Ensure demo dir and host keypair exist
    module: sys.run
    bind:
      - keypair-files
    state:
      bootstrap:
        args:
          cmd: >-
            /bin/sh -lc 'set -eu;
            DEMO_DIR="/tmp/keypairdemo";
            HOST="{{ traits["system.hostname.fqdn"] | default("unknown-host") }}";
            PRIV="${DEMO_DIR}/${HOST}.priv";
            PUB="${DEMO_DIR}/${HOST}.pub";
            mkdir -p "${DEMO_DIR}";
            if [ ! -s "${PRIV}" ]; then
              ssh-keygen -q -t ed25519 -N "" -f "${PRIV}";
              chmod 600 "${PRIV}";
            fi;
            if [ ! -s "${PUB}" ]; then
              ssh-keygen -y -f "${PRIV}" > "${PUB}";
              chmod 644 "${PUB}";
            fi'

  keypair-publish-pub:
    descr: Push local host pubkey to Master datastore
    module: cfg.resource
    bind:
      - keypair-files
    state:
      bootstrap:
        opts:
          - push
        args:
          src: /keypairdemo/{{ traits["system.hostname.fqdn"] | default("unknown-host") }}.pub
          file: /tmp/keypairdemo/{{ traits["system.hostname.fqdn"] | default("unknown-host") }}.pub

      regen-priv:
        opts:
          - push
        args:
          src: /keypairdemo/{{ traits["system.hostname.fqdn"] | default("unknown-host") }}.pub
          file: /tmp/keypairdemo/{{ traits["system.hostname.fqdn"] | default("unknown-host") }}.pub

  keypair-repair-pub:
    descr: Pull host pubkey from Master datastore when deleted
    module: cfg.resource
    bind:
      - keypair-files
    state:
      repair-pub:
        opts:
          - pull
        args:
          src: /keypairdemo/{{ traits["system.hostname.fqdn"] | default("unknown-host") }}.pub
          file: /tmp/keypairdemo/{{ traits["system.hostname.fqdn"] | default("unknown-host") }}.pub
          mode: "0644"

  keypair-regen-priv:
    descr: Regenerate keypair when private key is missing
    module: sys.run
    bind:
      - keypair-files
    state:
      regen-priv:
        args:
          cmd: >-
            /bin/sh -lc 'set -eu;
            DEMO_DIR="/tmp/keypairdemo";
            HOST="{{ traits["system.hostname.fqdn"] | default("unknown-host") }}";
            PRIV="${DEMO_DIR}/${HOST}.priv";
            PUB="${DEMO_DIR}/${HOST}.pub";
            mkdir -p "${DEMO_DIR}";
            rm -f "${PRIV}" "${PUB}" "${PRIV}.pub";
            ssh-keygen -q -t ed25519 -N "" -f "${PRIV}";
            if [ -f "${PRIV}.pub" ]; then mv -f "${PRIV}.pub" "${PUB}"; fi;
            if [ ! -s "${PUB}" ]; then ssh-keygen -y -f "${PRIV}" > "${PUB}"; fi;
            chmod 600 "${PRIV}";
            chmod 644 "${PUB}"'

events:
  $|$|$|$:
    handlers:
      - console-logger
      - outcome-logger

    console-logger:
      concise: false
      prefix: Keypair Demo

    outcome-logger:
      prefix: Keypair Demo
