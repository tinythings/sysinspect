sensors:
  interval:
    min: 500
    max: 1000
    unit: milliseconds

  keyring-dir-watch:
    description: Watch /tmp/keyringdemo for host key and pubring file deletions
    listener: sys.filesystem
    opts:
      - deleted
    args:
      path: /tmp/keyringdemo

events:
  keyring-dir-watch|sys.filesystem|deleted@/tmp/keyringdemo/$.pub|0:
    handlers:
      - pipeline
      - console-logger

    pipeline:
      calls:
        - query: keyring/keyring-files/repair-pub
        - query: keyring/keyring-files/pubring
      verbose: true

    console-logger:
      concise: false
      prefix: Keyring Demo

  keyring-dir-watch|sys.filesystem|deleted@/tmp/keyringdemo/$.priv|0:
    handlers:
      - pipeline
      - console-logger

    pipeline:
      calls:
        - query: keyring/keyring-files/regen-priv
      verbose: true

    console-logger:
      concise: false
      prefix: Keyring Demo

  keyring-dir-watch|sys.filesystem|deleted@/tmp/keyringdemo/pubring/$.pub|0:
    handlers:
      - pipeline
      - console-logger

    pipeline:
      calls:
        - query: keyring/keyring-files/pubring
      verbose: true

    console-logger:
      concise: false
      prefix: Keyring Demo

  $|$|$|$:
    handlers:
      - outcome-logger

    outcome-logger:
      prefix: Keyring Demo
