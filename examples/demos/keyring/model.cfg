name: Keyring Demo
version: "0.1.0"
description: |
  Demo model for exchanging per-host public keys through the Master datastore
  and materialising a shared local pubring under /tmp/keyringdemo/pubring.
maintainer: Sysinspect Demo

checkbook:
  keyring:
    - keyring-demo

relations:
  keyring-demo:
    $:
      requires:
        - keyring-files

entities:
  keyring-files:
    descr: Host keypair files and shared pubring in /tmp/keyringdemo

actions:
  keyring-bootstrap:
    descr: Ensure demo dir, pubring dir, and host keypair exist
    module: sys.run
    bind:
      - keyring-files
    state:
      bootstrap:
        args:
          cmd: >-
            /bin/sh -lc 'set -eu;
            DEMO_DIR="/tmp/keyringdemo";
            PUBRING_DIR="${DEMO_DIR}/pubring";
            HOST="{{ traits['system']['hostname']['fqdn'] | default(value='unknown-host') }}";
            PRIV="${DEMO_DIR}/${HOST}.priv";
            PUB="${DEMO_DIR}/${HOST}.pub";
            mkdir -p "${DEMO_DIR}" "${PUBRING_DIR}";
            if [ ! -s "${PRIV}" ]; then
              ssh-keygen -q -t ed25519 -N "" -f "${PRIV}";
              chmod 600 "${PRIV}";
            fi;
            if [ ! -s "${PUB}" ]; then
              ssh-keygen -y -f "${PRIV}" > "${PUB}";
              chmod 644 "${PUB}";
            fi'

  keyring-publish-pub:
    descr: Push local host pubkey to Master datastore
    module: cfg.resource
    bind:
      - keyring-files
    state:
      bootstrap:
        opts:
          - push
        args:
          src: /keyringdemo/{{ traits['system']['hostname']['fqdn'] | default(value='unknown-host') }}.pub
          file: /tmp/keyringdemo/{{ traits['system']['hostname']['fqdn'] | default(value='unknown-host') }}.pub
          tls: true
          tls-accept-insecure: true
          port: 4202

      regen-priv:
        opts:
          - push
        args:
          src: /keyringdemo/{{ traits['system']['hostname']['fqdn'] | default(value='unknown-host') }}.pub
          file: /tmp/keyringdemo/{{ traits['system']['hostname']['fqdn'] | default(value='unknown-host') }}.pub
          tls: true
          tls-accept-insecure: true
          port: 4202

  keyring-repair-pub:
    descr: Pull host pubkey from Master datastore when deleted
    module: cfg.resource
    bind:
      - keyring-files
    state:
      repair-pub:
        opts:
          - pull
        args:
          src: /keyringdemo/{{ traits['system']['hostname']['fqdn'] | default(value='unknown-host') }}.pub
          file: /tmp/keyringdemo/{{ traits['system']['hostname']['fqdn'] | default(value='unknown-host') }}.pub
          mode: "0644"
          tls: true
          tls-accept-insecure: true
          port: 4202

  pubring:
    descr: Sync all published cluster pubkeys into local pubring
    module: cfg.resource
    bind:
      - keyring-files
    state:
      bootstrap:
        opts:
          - sync-dir
        args:
          src: /keyringdemo/
          dst: /tmp/keyringdemo/pubring
          mode: "0644"
          tls: true
          tls-accept-insecure: true
          port: 4202

      regen-priv:
        opts:
          - sync-dir
        args:
          src: /keyringdemo/
          dst: /tmp/keyringdemo/pubring
          mode: "0644"
          tls: true
          tls-accept-insecure: true
          port: 4202

      repair-pub:
        opts:
          - sync-dir
        args:
          src: /keyringdemo/
          dst: /tmp/keyringdemo/pubring
          mode: "0644"
          tls: true
          tls-accept-insecure: true
          port: 4202

      pubring:
        opts:
          - sync-dir
        args:
          src: /keyringdemo/
          dst: /tmp/keyringdemo/pubring
          mode: "0644"
          tls: true
          tls-accept-insecure: true
          port: 4202

  keyring-regen-priv:
    descr: Regenerate keypair when private key is missing
    module: sys.run
    bind:
      - keyring-files
    state:
      regen-priv:
        args:
          cmd: >-
            /bin/sh -lc 'set -eu;
            DEMO_DIR="/tmp/keyringdemo";
            PUBRING_DIR="${DEMO_DIR}/pubring";
            HOST="{{ traits['system']['hostname']['fqdn'] | default(value='unknown-host') }}";
            PRIV="${DEMO_DIR}/${HOST}.priv";
            PUB="${DEMO_DIR}/${HOST}.pub";
            mkdir -p "${DEMO_DIR}" "${PUBRING_DIR}";
            rm -f "${PRIV}" "${PUB}" "${PRIV}.pub";
            ssh-keygen -q -t ed25519 -N "" -f "${PRIV}";
            if [ -f "${PRIV}.pub" ]; then mv -f "${PRIV}.pub" "${PUB}"; fi;
            if [ ! -s "${PUB}" ]; then ssh-keygen -y -f "${PRIV}" > "${PUB}"; fi;
            chmod 600 "${PRIV}";
            chmod 644 "${PUB}"'

events:
  $|$|$|$:
    handlers:
      - console-logger
      - outcome-logger

    console-logger:
      concise: false
      prefix: Keyring Demo

    outcome-logger:
      prefix: Keyring Demo
