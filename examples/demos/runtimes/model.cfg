name: "Runtime Demo Pack"
version: "0.1"
description: |
  Demo model that calls one example module from each supported runtime:

  - Lua via `lua.reader`
  - Python via `py3.hello`
  - Wasm via `wasm.hellodude`

  This model is meant to be used together with the payload and build steps
  described in README.md in the same directory.

maintainer: SysInspect Demo
checkbook:
relations:
entities:
  - demo-lua
  - demo-py3
  - demo-wasm

actions:
  demo-lua:
    descr: "Read VERSION from /etc/os-release through Lua runtime"
    module: lua.reader
    bind:
      - demo-lua
    state:
      $:
        opts:
          - rt.logs
        args: {}

  demo-py3:
    descr: "Add 2 and 5 through Python runtime"
    module: py3.hello
    bind:
      - demo-py3
    state:
      $:
        args:
          a: 2
          b: 5

  demo-wasm:
    descr: "Return VERSION from /etc/os-release through Wasm runtime"
    module: wasm.hellodude
    bind:
      - demo-wasm
    state:
      $:
        args:
          key: VERSION

constraints:

events:
  $|$|$|$:
    handlers:
      - console-logger
      - outcome-logger

    console-logger:
      concise: false
      prefix: Runtime Demo

    outcome-logger:
      prefix: Runtime Demo
