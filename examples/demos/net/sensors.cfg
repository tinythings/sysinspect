sensors:
  host-watch:
    description: Watch hostname changes through nettools
    listener: net.hostname
    interval:
      secs: 2
      nanos: 0
    args:
      locked: false

  route-watch:
    description: Watch route table changes through nettools
    listener: net.route
    interval:
      secs: 2
      nanos: 0
    opts:
      - route-added
      - route-removed
      - route-changed
      - default-changed
    args:
      locked: false

  wifi-watch:
    description: Watch Wi-Fi changes through nettools
    listener: net.wifi
    interval:
      secs: 2
      nanos: 0
    opts:
      - connected
      - disconnected
      - changed
    args:
      locked: false

  throughput-watch:
    description: Watch throughput through nettools
    listener: net.throughput
    interval:
      secs: 2
      nanos: 0
    args:
      locked: false

  health-watch:
    description: Watch active network health through nettools
    listener: net.health
    interval:
      secs: 2
      nanos: 0
    args:
      targets:
        - 1.1.1.1:53
        - 8.8.8.8:53
      window: 3
      timeout: 500ms
      latency-degraded-ms: 150
      loss-degraded-pct: 25
      locked: false
