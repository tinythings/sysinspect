sensors:
  host-watch:
    description: Watch hostname changes through nettools
    listener: net.hostname
    interval:
      secs: 2
      nanos: 0
    args:
      locked: false

  route-watch:
    description: Watch route table changes through nettools
    listener: net.route
    interval:
      secs: 2
      nanos: 0
    opts:
      - route-added
      - route-removed
      - route-changed
      - default-changed
    args:
      locked: false

  wifi-watch:
    description: Watch Wi-Fi changes through nettools
    listener: net.wifi
    interval:
      secs: 2
      nanos: 0
    opts:
      - connected
      - disconnected
      - changed
    args:
      locked: false
