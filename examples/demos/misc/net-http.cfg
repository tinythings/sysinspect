name: "net.http Demo"
version: "0.1"
description: |
  Demo model that calls the built-in `net.http` module against a real JSON
  endpoint and then passes a value extracted via JSONPath into another action.

  Assumptions:
  - the module is installed as `net.http`
  - outbound HTTPS access to `https://httpbin.org/json` is available
  - the example model `single/info` is available for the follow-up print step

maintainer: Bo Maryniuk <still@javascriptsucks.com>
checkbook:
relations:
entities:
  - httpbin-json

actions:
  httpbin-json:
    descr: "Fetch JSON document from httpbin.org"
    module: net.http
    bind:
      - httpbin-json
    state:
      $:
        args:
          method: GET
          url: https://httpbin.org/json
          headers:
            Accept: application/json

constraints:

events:
  httpbin-json|$|$|0:
    handlers:
      - pipeline
      - console-logger

    pipeline:
      calls:
        - query: single/info
          context:
            osversion: "Title: $.data.body.json.slideshow.title, author: $.data.body.json.slideshow.author"
      verbose: true

    console-logger:
      concise: false
      prefix: net.http Demo

  $|$|$|$:
    handlers:
      - outcome-logger

    outcome-logger:
      prefix: net.http Demo
