name: "Python 3 Runtime Demo"
version: "0.1"
description: |
  Demo model that calls the example Python runtime modules installed under
  the SysInspect Python 3 runtime layout.

  Assumptions:
  - the runtime module is installed as `runtime.py3`
  - example scripts are installed under `lib/runtime/python3`
  - helper libraries are installed under `lib/runtime/python3/site-packages`

maintainer: Bo Maryniuk <still@javascriptsucks.com>
checkbook:
relations:
entities:
  - py3-hello
  - py3-reader
  - py3-caller

actions:
  py3-hello:
    descr: "Run hello.py via Python 3 runtime"
    module: py3.hello
    bind:
      - py3-hello
    state:
      $:
        args:
          a: 2
          b: 5

  py3-reader:
    descr: "Run reader.py and forward Python logs"
    module: py3.reader
    bind:
      - py3-reader
    state:
      $:
        opts:
          - rt.logs

  py3-caller:
    descr: "Run caller.py against /etc and return output as lines"
    module: py3.caller
    bind:
      - py3-caller
    state:
      $:
        opts:
          - lines
          - rt.logs
        args:
          dir: /etc

constraints:

events:
  $|$|$|$:
    handlers:
      - console-logger
      - outcome-logger

    console-logger:
      concise: false
      prefix: Py3 Demo

    outcome-logger:
      prefix: Py3 Demo
