sensors:
  cirquit-break:
    profile:
      - default
    description: How not to shoot oneself into own foot
    listener: fsnotify
    opts:
      - changed
    args:
      path: /tmp/loop/

events:
  cirquit-break|fsnotify|changed@/tmp/loop/foo.txt|0:
    handlers:
      - pipescript

    pipescript:
      program: /tmp/loop.sh
      quiet: false
      format: json
