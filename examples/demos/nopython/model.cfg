name: "Python Without Python"
version: "0.1"
description: |
  Demo for minimal Alpine-like systems where Python is not installed.

  The model uses native actions and DSL constraints to decide whether the
  target matches the intended profile. Only when it does, the embedded Python
  runtime is invoked to prove that Python code still runs without host Python.

  If the target does not match, the model returns troll messages from YAML
  actions instead of burying the logic inside the Python script.

maintainer: SysInspect Demo
interface:
  entities:
    - all
  actions:
    - python-proof
checkbook:
relations:
entities:
  - all
  - python-proof
  - verify-fedora
  - verify-python
  - verify-other

actions:
  target-alpine:
    descr: "Detect Alpine targets for the demo gate"
    module: sys.run
    bind:
      - all
    state:
      $:
        args:
          cmd: >-
            awk -F= '$1=="ID"{gsub(/"/,"",$2); printf "%s", $2}' /etc/os-release

  target-fedora:
    descr: "Detect Fedora targets for the demo gate"
    module: sys.run
    bind:
      - all
    state:
      $:
        args:
          cmd: >-
            awk -F= '$1=="ID"{gsub(/"/,"",$2); printf "%s", $2}' /etc/os-release

  host-python-absent:
    descr: "Detect whether host python3 is absent"
    module: sys.pkg
    bind:
      - all
    state:
      $:
        opts:
          - check
        args:
          name: python3

  host-python-present:
    descr: "Detect whether host python3 is already present"
    module: sys.pkg
    bind:
      - all
    state:
      $:
        opts:
          - check
        args:
          name: python3

  python-proof:
    descr: "Run one embedded Python proof action only on Alpine without host python3"
    module: py3.nopython
    if-true:
      - target-alpine
      - host-python-absent
    if-false:
      - target-fedora
      - host-python-present
    bind:
      - all
      - python-proof
    state:
      $:
        opts:
          - rt.logs

  verify-fedora:
    descr: "Return a Fedora-specific message"
    module: sys.run
    if-true:
      - target-fedora
    bind:
      - all
      - verify-fedora
    state:
      $:
        args:
          cmd: >-
            printf 'This is Fedora. Remove Python first to speed up Ansible :-P'

  verify-python:
    descr: "Return a message when the host already provides python3"
    module: sys.run
    if-false:
      - target-alpine
      - target-fedora
    if-true:
      - host-python-present
    bind:
      - all
      - verify-python
    state:
      $:
        args:
          cmd: >-
            printf 'Host python3 detected, nope.'

  verify-other:
    descr: "Return a generic message for non-Alpine minimal systems"
    module: sys.run
    if-false:
      - target-alpine
      - target-fedora
      - host-python-present
    bind:
      - all
      - verify-other
    state:
      $:
        args:
          cmd: >-
            printf 'Not Alpine. Cute host, wrong demo.'

constraints:
  target-alpine:
    descr: Target OS must be Alpine
    entities:
      - all
    all:
      $:
        - fact: stdout
          equals: alpine

  target-fedora:
    descr: Target OS is Fedora
    entities:
      - all
    all:
      $:
        - fact: stdout
          equals: fedora

  host-python-absent:
    descr: Host must not provide python3
    entities:
      - all
    all:
      $:
        - fact: installed
          equals: false

  host-python-present:
    descr: Host already provides python3
    entities:
      - all
    all:
      $:
        - fact: installed
          equals: true

events:
  $|$|$|$:
    handlers:
      - console-logger
      - outcome-logger

    console-logger:
      concise: false
      prefix: No Python Demo

    outcome-logger:
      prefix: No Python Demo

telemetry: {}
