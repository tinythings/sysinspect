name: Unit/Integration Testing

on:
  push:
    branches:
      - "master"
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '**.rst'
      - 'Makefile'
      - 'Makefile.in'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '**.rst'
      - 'Makefile'
      - 'Makefile.in'

env:
  CARGO_TERM_COLOR: always
  # RUSTFLAGS: -D warnings

jobs:
  core_unit_tests:
    name: Core unit tests
    runs-on: ubuntu-latest
    container:
      image: rust:1-bookworm

    steps:
      - name: Install deps
        run: |
          apt-get update
          apt-get install -y protobuf-compiler llvm-dev clang libclang-dev cmake libsodium-dev libpam0g-dev

      - uses: actions/checkout@v2
      - name: Run test target
        run: |
          make test-core

  modules_unit_tests:
    name: Modules unit tests
    runs-on: ubuntu-latest
    container:
      image: rust:1-bookworm

    steps:
      - name: Install deps
        run: |
          apt-get update
          apt-get install -y protobuf-compiler llvm-dev clang libclang-dev cmake libsodium-dev libpam0g-dev

      - uses: actions/checkout@v2
      - name: Run test target
        run: |
          make test-modules

  sensors_unit_tests:
    name: Sensors unit tests
    runs-on: ubuntu-latest
    container:
      image: rust:1-bookworm

    steps:
      - name: Install deps
        run: |
          apt-get update
          apt-get install -y protobuf-compiler llvm-dev clang libclang-dev cmake libsodium-dev libpam0g-dev

      - uses: actions/checkout@v2
      - name: Run test target
        run: |
          make test-sensors

  integration_tests:
    name: Integration tests
    runs-on: ubuntu-latest
    container:
      image: rust:1-bookworm

    steps:
      - name: Install deps
        run: |
          apt-get update
          apt-get install -y protobuf-compiler llvm-dev clang libclang-dev cmake libsodium-dev libpam0g-dev

      - uses: actions/checkout@v2
      - name: Run test target
        run: |
          make test-integration
